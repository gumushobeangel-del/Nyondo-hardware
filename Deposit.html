<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deposit Scheme</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      /* CARD */
      .container {
        width: 100%;
        max-width: 500px;
        background: rgb(118, 177, 198);
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
      }

      /* LOGO */
      .logo {
        text-align: center;
        margin-bottom: 10px;
      }

      .logo img {
        width: 300px;
      }

      h2 {
        text-align: center;
        margin-bottom: 15px;
        color: #1e2a38;
      }

      label {
        display: block;
        margin-top: 12px;
        font-size: 16px;
        font-weight: bold;
        color: #333;
      }

      input,
      select {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        border: 1px solid #ddd;
        border-radius: 8px;
        outline: none;
      }

      input:focus,
      select:focus {
        border-color: #3498db;
      }

      button {
        width: 60%;
        margin-top: 18px;
        padding: 12px;
        background: linear-gradient(135deg, #1e2a38, #2f4f6f);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }

      button:hover {
        background: #1e2a38;
      }

      .btn {
        display: block;
        text-align: center;
        margin-top: 10px;
        padding: 10px;
        width: 60%;
        background: linear-gradient(135deg, #1e2a38, #2f4f6f);
        color: white;
        text-decoration: none;
        border-radius: 8px;
      }

      .btn:hover {
        background: #1e2a38;
      }

      .rec {
        text-align: center;
        margin-top: 15px;
        font-size: 17px;
        color: rgb(18, 17, 17);
      }

      @media (max-width: 600px) {
        .container {
          margin: 15px;
          padding: 20px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="logo">
        <img src="images/logo22.png" alt="Logo" />
      </div>

      <h2>Deposit Scheme</h2>

      <form>
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required />

        <label>Phone Number</label>
        <input type="tel" placeholder="+256..." required />

        <label>Deposit Amount (UGX)</label>
        <input type="number" placeholder="Enter amount" required />

        <label>Payment Method</label>
        <select required>
          <option value="">Select method</option>
          <option>Mobile Money</option>
          <option>Bank Transfer</option>
          <option>Cash</option>
        </select>

        <label>Purpose of Deposit</label>
        <input type="text" placeholder="e.g Cement purchase" />

        <button type="submit">Submit Deposit</button>

        <a href="stock.html" class="btn">Add Stock</a>

        <p class="rec">Your deposit will be securely recorded and confirmed.</p>
      </form>
    </div>
  </body>
</html>
