<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NYONDO Hardware Stock Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <img src="images/logo22.png" alt="Logo" class="logo" />
      </div>
      <h1>NYONDO HARDWARE CUSTOMER DEPOSIT FORM</h1>
      <form>
        <h2>Customer Details</h2>
        <label for="Name">Full Name</label>
        <input type="text" id="Name" placeholder="name" required />

        <label for="NIN">NIN Number</label>
        <input type="text" id="NIN" placeholder="NIN Number" required />

        <label for="number">Phone Number</label>
        <input type="tel" id="number" placeholder="Phone Number" required />

        <label for="location">Location</label>
        <input type="text" id="location" placeholder="Location" required />

        <h2>Deposit Information</h2>
        <label for="amount">Amount</label>
        <input type="text" id="amount" placeholder="amount" required />

        <label for="method">Payment Method</label>
        <input type="text" id="method" placeholder="Payment method" required />

        <label for="unit">Transaction ID</label>
        <input
          type="text"
          id="Transaction"
          placeholder="Transaction ID"
          required
        />

        <label for="currency">Currency</label>
        <input type="text" id="currency" placeholder="currency" required />

        <h2>Purpose of Deposit</h2>
        <label for="reason">Reason</label>
        <input type="text" id="reason" placeholder="reason" required />

        <label for="product">Product</label>
        <input type="text" id="product" placeholder="product" required />

        <label for="quality">Quality</label>
        <input type="text" id="quality" placeholder="quality" required />

        <label for="deposit">Deposit Date</label>
        <input type="date" id="deposit" placeholder="deposit date" required />

        <h2>Additional Notes</h2>
        <label for="comments">Comments</label>
        <input type="text" id="comments" placeholder="comments" required />

        <label for="recorded">Recorded by</label>
        <input type="text" id="recorded" placeholder="recorded" required />

        <button type="submit">Register</button>
      </form>
    </div>
  </body>
</html>
