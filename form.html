<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f4f6f8;
        display: flex;
        justify-content: center;
        padding: 20px;
      }

      label {
        display: block;
        margin-top: 12px;
        font-size: 16px;
        font-weight: bold;
      }

      input {
        padding: 10px;
        margin-top: 7px;
        /* width: 100%; */
        border-radius: 6px;
        border: 1px solid #242323;
        width: 80%;
      }
      form {
        display: flex;
        flex-direction: column;
        margin-top: 15px;
      }

      button {
        margin-top: 20px;
        padding: 12px;
        width: 100%;
        border-radius: 6px;
        background: #2468b1;
        color: white;
        font-size: 18px;
        cursor: pointer;
        border: none;
        width: 60%;
      }

      .container {
        background-color: white;
        padding: 30px;
        width: 550px;
        /* the form will not be hanging */
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      button:hover {
        background: #343232;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>JOIN THROUGH THIS FORM</h1>
      <form>
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="full name" required />

        <label for="Email Address">Email Address</label>
        <input type="email" id="address" placeholder="email address" required />

        <label for="Password">Password</label>
        <input type="ext" id="password" placeholder="password" required />

        <label for="Phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="phone number" required />

        <label for="location">Location</label>
        <input type="text" id="location" placeholder="location" />

        <button>Log in</button>
      </form>
    </div>
  </body>
</html>
