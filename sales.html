<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <div class="logo">
        <img src="images/logo22.png" alt="Logo" class="logo" />
      </div>
      <h1>NYONDO HARDWARE SALES FORM</h1>
      <form>
        <label for="fullName">Name</label>
        <input type="text" id="fullName" placeholder="Full Name" required />

        <label for="quantity">Quantity</label>
        <input type="text" id="quantity" placeholder="quantity" required />

        <label for="date">Date</label>
        <input type="date" id="date" placeholder="date" required />

        <label for="color">Color</label>
        <input type="text" id="color" placeholder="color" required />

        <label for="unit price">Unit Price</label>
        <input type="text" id="unit" placeholder="unit price" />

        <label for="customer  name">Customer Name</label>
        <input type="text" id="name" placeholder="Company Name" />

        <label for="contact">Contact (Customer)</label>
        <input type="tel" id="contact" placeholder="Contact" />

        <label for="type">Type of Item</label>
        <input type="text" id="type" placeholder="type of item" />

        <label for="brand">Brand of item</label>
        <input type="text" id="brand" placeholder="brand of item" />

        <button type="submit">Register</button>
      </form>
    </div>
  </body>
</html>
