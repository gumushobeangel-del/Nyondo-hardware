<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: rgb(88, 186, 218);
      }
      .container {
        width: 300px;
        margin: 100px auto;
        padding: 20px;
        background-color: white;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        height: 80vh;
      }
      .container h1 {
        text-align: center;
        margin-bottom: 20px;
      }
      .container label {
        display: block;
        margin-bottom: 5px;

        font-size: 15px;
      }
      .container input {
        width: 90%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #878484;
        border-radius: 4px;
        font-size: 13px;
        background-color: #e7e7e7;
      }
      .container button {
        width: 90%;
        padding: 8px;
        background-color: #6f00ff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 18px;
      }
      .container button:hover {
        background-color: #292b30;
      }
      .container p {
        text-align: center;
        margin-top: 15px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Welcome Back!</h1>
      <form>
        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="username"
          required
        />
        <label for="password">Password:</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="password"
          required
        />
        <button type="submit">LOGIN</button>
        <p>Dont have an account? <a href="sign.html">Sign up</a></p>
      </form>
    </div>
  </body>
</html>
