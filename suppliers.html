<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suppliers</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <div class="logo">
        <img src="images/logo22.png" alt="Logo" class="logo-img" />
      </div>
      <div class="card">
        <h1>SUPPLIERS MANAGEMENT</h1>
        <h2>Add Supplier</h2>

        <form>
          <label>Supplier Name</label>
          <input
            type="text"
            id="supplierName"
            placeholder="Enter name"
            required
          />

          <label>Company</label>
          <input type="text" id="company" placeholder="Company name" required />

          <label>Contact</label>
          <input type="text" id="contact" placeholder="+256..." required />

          <label>Email</label>
          <input
            type="email"
            id="email"
            placeholder="email@example.com"
            required
          />

          <label>Location</label>
          <input
            type="text"
            id="location"
            placeholder="City or address"
            required
          />

          <button type="submit">Save Supplier</button>
          <a href="dash.html" class="btn">Back to Dashboard</a>
        </form>
      </div>
    </div>
  </body>
</html>
